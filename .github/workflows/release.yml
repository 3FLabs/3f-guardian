name: Release

on:
  push:
    branches: [main]

# OIDC trusted-publishing requires `id-token: write`. We also need
# `contents: write` so the Changesets action can push the "Version Packages"
# PR, and `pull-requests: write` so it can open / update that PR.
permissions:
  id-token: write
  contents: write
  pull-requests: write

# Don't ever publish twice from concurrent main pushes.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: changesets version + publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Required by changesets to read the full git history.
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # OIDC trusted-publisher flow needs npm ≥ 11.5 — that version is
      # the first to authenticate to npm using the GitHub OIDC token
      # rather than an `NPM_TOKEN` secret. We pin Node 22 (bundles npm
      # 10) and upgrade npm explicitly. `bun publish` does not yet
      # support provenance, so the actual publish step is `npm publish`
      # under the hood (driven by `changeset publish`).
      - name: Setup Node.js (for npm publish)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm to ≥ 11.5 (OIDC trusted publisher)
        run: npm install -g npm@latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run build

      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          # Bumps versions in pending changesets, opens a "Version Packages" PR.
          version: bun run changeset:version
          # When the version PR merges, this command runs and publishes.
          # `npm publish` reads the OIDC token from the runner via
          # id-token:write and uses the npm trusted-publisher flow — no
          # NPM_TOKEN secret required if the package is configured as an
          # OIDC trusted publisher on npmjs.com.
          publish: bunx changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
