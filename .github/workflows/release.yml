name: Release

on:
  push:
    branches: [main]

# No workflow-level permissions: grants live on the jobs that need them, so
# the called CI verify job (which runs `bun install` and the full test suite
# against third-party code) never sees a write-capable token.
permissions: {}

# Don't ever publish twice from concurrent main pushes.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Run the full CI suite (build + lint + format + typecheck + test) before doing
  # anything releasey. `release` blocks on this via `needs: verify`, so a red test
  # never reaches changesets/action — neither the version PR nor the publish step.
  # Verification only needs to read the repo.
  verify:
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read

  release:
    needs: verify
    name: changesets version + publish
    runs-on: ubuntu-latest
    # Build + version/publish completes in a few minutes; don't let a
    # hung npm/API call hold the write-scoped token for 6 hours.
    timeout-minutes: 30
    # OIDC trusted-publishing requires `id-token: write`. We also need
    # `contents: write` so the Changesets action can push the "Version Packages"
    # PR, and `pull-requests: write` so it can open / update that PR.
    permissions:
      id-token: write
      contents: write
      pull-requests: write
    steps:
      # Don't persist the checkout token: this job's GITHUB_TOKEN is
      # write-scoped, and `bun install` / `bun run build` below execute
      # third-party lifecycle and build scripts that must not find a
      # push-capable credential sitting in .git/config. Authenticated
      # git access is re-added in a dedicated step immediately before
      # changesets/action (the only step that needs to push).
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Required by changesets to read the full git history.
          fetch-depth: 0
          persist-credentials: false

      # Bun version is pinned via the root package.json `packageManager`
      # field — one source of truth shared by local dev and ci.yml.
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json

      # OIDC trusted-publisher flow needs npm ≥ 11.5 — that version is
      # the first to authenticate to npm using the GitHub OIDC token
      # rather than an `NPM_TOKEN` secret. Node 24 ships npm 11+ out
      # of the box, so no explicit upgrade is required (the in-place
      # `npm install -g npm@latest` from npm 10 is buggy on hosted
      # runners). `bun publish` does not yet support provenance, so the
      # actual publish step is `npm publish` under the hood (driven by
      # `changeset publish`).
      - name: Setup Node.js (for npm publish)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run build

      # Re-add authenticated git access only now, after install/build ran
      # without credentials: changesets/action creates/updates the Version
      # PR through the API (GITHUB_TOKEN env) but pushes the version branch
      # with plain `git push`, which needs a token on the remote URL.
      - name: Authenticate git for the changesets push
        run: git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # SHA-pinned: this action runs with the write-scoped GITHUB_TOKEN and
      # drives `npm publish`, so a mutable tag here is the most sensitive
      # supply-chain edge in the repo.
      - name: Create Release PR or Publish
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          # Bumps versions in pending changesets, opens a "Version Packages" PR.
          version: bun run changeset:version
          # When the version PR merges, this command runs and publishes.
          # `npm publish` reads the OIDC token from the runner via
          # id-token:write and uses the npm trusted-publisher flow — no
          # NPM_TOKEN secret required if the package is configured as an
          # OIDC trusted publisher on npmjs.com.
          #
          # IMPORTANT: changesets/action splits this string by whitespace
          # and execs the result directly — there is NO shell involved, so
          # `&&`, pipes, etc. would be passed as literal positional args.
          # That's why the chain (build → rewrite workspace:* → publish) is
          # inside the `changeset:publish` npm script: `bun run` executes
          # script bodies through a shell, where `&&` does what you expect.
          # The rewrite runs only in the publish phase (changesets/action
          # invokes `publish:` only when no pending changesets remain), so
          # `workspace:*` stays untouched in the Version PR and on main.
          publish: bun run changeset:publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
