name: CI

on:
  pull_request:
  # Invoked from release.yml as the gate that must pass before changesets/action runs.
  # We deliberately don't trigger on `push: branches[main]` here — release.yml owns the
  # main-push pipeline and would otherwise duplicate the run.
  workflow_call:

# Verification only ever reads the repo. When called from release.yml this can
# only narrow (never expand) whatever the caller granted.
permissions:
  contents: read

jobs:
  verify:
    name: build + lint + typecheck + test + integration
    runs-on: ubuntu-latest
    steps:
      # No later step needs git credentials (we never push from CI), so
      # don't leave the GITHUB_TOKEN sitting in .git/config for the rest
      # of the job — release.yml calls this workflow and its token may
      # carry write scopes.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      # Bun version is pinned via the root package.json `packageManager`
      # field — one source of truth shared by local dev and release.yml.
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json

      # vitest 4 spawns Node child workers (its `forks` pool, used by
      # the integration config) and prool 0.2.4 calls
      # `Promise.withResolvers` — added in Node 22 — when booting an
      # anvil instance. The runner's default Node is older, so install
      # an explicit modern version. Aligned with `release.yml`.
      - name: Setup Node.js (for vitest workers)
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24

      # `anvil` is required by the prool-backed integration suite (one
      # instance per vitest worker, multiplexed via path-routed URLs in
      # `@3flabs/guardian-test-fixtures`); we don't run `forge build`
      # here because all foundry artifacts are bundled in
      # `packages/guardian-test-fixtures/artifacts/`. Pinned to v1.7.1
      # — the latest foundry release, matching local dev and the
      # bundled fixtures — rather than `stable` so runs are
      # reproducible. Known tradeoff: the action fetches the foundryup
      # installer from foundry HEAD at run time, so the action SHA pin
      # does not pin the installer script; the binaries it installs are
      # the pinned release, attestation-verified by foundryup.
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@c7450ba673e133f5ee30098b3b54f444d3a2ca2d # v1.8.0
        with:
          version: v1.7.1

      - name: Install
        run: bun install --frozen-lockfile

      # Validates the bundled contract fixtures (artifact integrity +
      # INDEX consistency). Sibling-repo drift detection is skipped with
      # a notice when the sibling checkouts aren't present — which is
      # always the case on a plain runner.
      - name: Fixtures check
        run: bun run fixtures:check

      # Build first so downstream packages resolve the workspace
      # dependency's `dist/index.d.ts` (per the `exports` map). Without
      # this, typecheck sees `Cannot find module '@3flabs/guardian'`.
      - name: Build
        run: bun run build

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      # Integration: boots a real anvil per vitest worker, deploys the
      # full Guardian stack (Facility, RequestFactory, RequestWhitelist
      # behind ERC-1967, OwnableMockFund, …), and exercises the §A
      # check runners + `makeSign*` orchestrators end-to-end. Bundled
      # artifacts mean no `forge build` is needed on the runner.
      - name: Integration test
        run: bun run test:integration
