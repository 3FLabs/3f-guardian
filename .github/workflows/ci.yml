name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    name: build + lint + typecheck + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      # Build first so downstream packages resolve the workspace
      # dependency's `dist/index.d.ts` (per the `exports` map). Without
      # this, typecheck sees `Cannot find module '@3flabs/guardian'`.
      - name: Build
        run: bun run build

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test
